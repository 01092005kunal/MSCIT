<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EMI Calculator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.2);
            width: 350px;
            text-align: center;
        }

        h2 {
            color: #333;
        }

        input[type="number"] {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            font-size: 16px;
            box-sizing: border-box;
        }

        input[type="submit"] {
            background-color: #007BFF;
            color: white;
            border: none;
            padding: 10px;
            width: 100%;
            cursor: pointer;
            font-size: 16px;
            border-radius: 5px;
        }

        input[type="submit"]:hover {
            background-color: #0056b3;
        }

        .result {
            margin-top: 20px;
            font-size: 20px;
            color: green;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>EMI Calculator</h2>

        <form method="POST">
            <input type="number" name="principal" placeholder="Loan Amount" step="0.01" required>

            <input type="number" name="rate" placeholder="Annual Interest Rate (%)" step="0.01" required>

            <input type="number" name="years" placeholder="Loan Duration (Years)" required>

            <input type="submit" value="Calculate EMI">
        </form>

        {% if emi is not none %}
        <div class="result">
            Monthly EMI: ₹{{ "%.2f"|format(emi) }}
        </div>
        {% endif %}
    </div>

</body>
</html>
