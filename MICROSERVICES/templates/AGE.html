<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Age Calculator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
            text-align: center;
            width: 350px;
        }

        h2 {
            color: #333;
        }

        input[type="date"] {
            width: 100%;
            padding: 10px;
            margin: 15px 0;
            font-size: 16px;
        }

        input[type="submit"] {
            background-color: #007BFF;
            color: white;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            border-radius: 5px;
            font-size: 16px;
        }

        input[type="submit"]:hover {
            background-color: #0056b3;
        }

        .result {
            margin-top: 20px;
            font-size: 20px;
            color: green;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Age Calculator</h2>

        <form method="POST">
            <label>Select Your Date of Birth:</label><br>
            <input type="date" name="dob" required><br>

            <input type="submit" value="Calculate Age">
        </form>

        {% if age is not none %}
            <div class="result">
                Your Age is {{ age }} years.
            </div>
        {% endif %}
    </div>

</body>
</html>
