<!DOCTYPE html>
<html>
<head>
    <title>Hello User</title>
</head>
<body>
    <h2>Enter your Name</h2>

    <form method="POST">
        <input type="text" name="username" placeholder="Your name" required>
        <button type="submit">Submit</button>
    </form>

    {% if username %}
        <h1>Hello, {{ username }}!</h1>
    {% endif %}
</body>
</html>
